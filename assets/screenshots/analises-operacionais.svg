<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Tela demonstrativa das análises operacionais">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fbfdfb"/><stop offset="1" stop-color="#f4f6f2"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop offset="0" stop-color="#2f3192"/><stop offset="0.42" stop-color="#2f7d4f"/><stop offset="0.70" stop-color="#c8a24a"/><stop offset="1" stop-color="transparent"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#171b1f" flood-opacity="0.10"/></filter>
    <style>.h1{font:750 28px 'Segoe UI',Arial,sans-serif;fill:#17201b}.h2{font:800 15px 'Segoe UI',Arial,sans-serif;fill:#24305a}.h3{font:750 15px 'Segoe UI',Arial,sans-serif;fill:#17201b}.p{font:400 13px 'Segoe UI',Arial,sans-serif;fill:#66736b}.small{font:600 12px 'Segoe UI',Arial,sans-serif;fill:#66736b}.tab{font:850 13px 'Segoe UI',Arial,sans-serif;fill:#20263a}.tabOn{font:850 13px 'Segoe UI',Arial,sans-serif;fill:#fff}.label{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#66736b}.value{font:850 28px 'Segoe UI',Arial,sans-serif;fill:#17201b}.badge{font:850 12px 'Segoe UI',Arial,sans-serif;fill:#1f5638}.btn{font:850 13px 'Segoe UI',Arial,sans-serif;fill:#fff}.brand{font:900 23px 'Segoe UI',Arial,sans-serif;fill:#2f3192}.body{font:650 13px 'Segoe UI',Arial,sans-serif;fill:#17201b}</style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="94" cy="14" r="220" fill="#2f3192" opacity="0.08"/><circle cx="1082" cy="30" r="210" fill="#2f7d4f" opacity="0.07"/>

  <rect x="34" y="22" width="1132" height="92" rx="14" fill="#ffffff" stroke="#d8ded8" filter="url(#shadow)"/>
  <rect x="34" y="22" width="1132" height="3" fill="url(#accent)"/>
  <rect x="58" y="43" width="76" height="56" rx="14" fill="#ffffff" stroke="#d8ded8"/><text x="80" y="79" class="brand">UB</text>
  <text x="154" y="61" class="h1">Usina Bazan</text><text x="154" y="88" class="p">Análises Operacionais</text><text x="154" y="106" class="small">Atualizado com dados fictícios</text>
  <rect x="860" y="48" width="92" height="34" rx="17" fill="#ffffff" stroke="#d8ded8"/><text x="884" y="70" class="tab">Launcher</text>
  <rect x="964" y="48" width="92" height="34" rx="17" fill="#ffffff" stroke="#d8ded8"/><text x="982" y="70" class="tab">Atualizar</text>
  <rect x="1068" y="48" width="76" height="34" rx="17" fill="#e7f2ea"/><text x="1085" y="70" class="badge">Online</text>

  <g transform="translate(34 130)">
    <rect x="0" y="0" width="102" height="36" rx="9" fill="#2f3192"/><text x="25" y="24" class="tabOn">Dashboard</text>
    <rect x="112" y="0" width="72" height="36" rx="9" fill="#fff" stroke="#d7dce8"/><text x="134" y="24" class="tab">Dados</text>
    <rect x="194" y="0" width="112" height="36" rx="9" fill="#fff" stroke="#d7dce8"/><text x="218" y="24" class="tab">Lançamento</text>
    <rect x="316" y="0" width="102" height="36" rx="9" fill="#fff" stroke="#d7dce8"/><text x="338" y="24" class="tab">Relatórios</text>
  </g>

  <rect x="34" y="182" width="1132" height="82" rx="10" fill="#ffffff" stroke="#d8ded8" filter="url(#shadow)"/>
  <g transform="translate(58 204)">
    <text class="label">Data inicial</text><rect y="18" width="120" height="32" rx="7" fill="#f8faf7" stroke="#d8ded8"/><text x="12" y="39" class="small">01/05/2026</text>
    <text x="140" class="label">Data final</text><rect x="140" y="18" width="120" height="32" rx="7" fill="#f8faf7" stroke="#d8ded8"/><text x="152" y="39" class="small">17/05/2026</text>
    <text x="280" class="label">Frente</text><rect x="280" y="18" width="96" height="32" rx="7" fill="#f8faf7" stroke="#d8ded8"/><text x="292" y="39" class="small">Todas</text>
    <text x="396" class="label">Turno</text><rect x="396" y="18" width="86" height="32" rx="7" fill="#f8faf7" stroke="#d8ded8"/><text x="408" y="39" class="small">1 e 2</text>
    <text x="502" class="label">Status</text><rect x="502" y="18" width="132" height="32" rx="7" fill="#f8faf7" stroke="#d8ded8"/><text x="514" y="39" class="small">Finalizadas</text>
    <rect x="940" y="18" width="82" height="34" rx="8" fill="#2f7d4f"/><text x="962" y="41" class="btn">Aplicar</text>
  </g>

  <g transform="translate(34 286)">
    <rect width="172" height="88" rx="10" fill="#ffffff" stroke="#d8ded8"/><text x="18" y="27" class="label">Registros</text><text x="18" y="62" class="value">128</text><text x="112" y="62" class="small">no filtro</text>
    <rect x="190" width="172" height="88" rx="10" fill="#ffffff" stroke="#d8ded8"/><text x="208" y="27" class="label">Eficiência média</text><text x="208" y="62" class="value" fill="#1f5638">87%</text>
    <rect x="380" width="172" height="88" rx="10" fill="#ffffff" stroke="#d8ded8"/><text x="398" y="27" class="label">Horas paradas</text><text x="398" y="62" class="value" fill="#20246f">14:30</text>
    <rect x="570" width="172" height="88" rx="10" fill="#ffffff" stroke="#d8ded8"/><text x="588" y="27" class="label">Em andamento</text><text x="588" y="62" class="value" fill="#a17114">04</text>
    <rect x="760" width="172" height="88" rx="10" fill="#ffffff" stroke="#d8ded8"/><text x="778" y="27" class="label">Colhedoras</text><text x="778" y="62" class="value">72</text>
    <rect x="950" width="182" height="88" rx="10" fill="#e7f2ea" stroke="#d8ded8"/><text x="968" y="30" class="body">Dados fictícios</text><text x="968" y="56" class="small">sem base real</text>
  </g>

  <g transform="translate(34 398)">
    <rect width="360" height="174" rx="10" fill="#ffffff" stroke="#d8ded8"/><text x="20" y="34" class="h2">Motivos com mais tempo parado</text><text x="310" y="34" class="small">Top 8</text>
    <rect x="20" y="62" width="220" height="14" rx="7" fill="#e8eafb"/><rect x="20" y="62" width="172" height="14" rx="7" fill="#2f3192"/><text x="256" y="75" class="small">04:20</text>
    <rect x="20" y="96" width="220" height="14" rx="7" fill="#e7f2ea"/><rect x="20" y="96" width="126" height="14" rx="7" fill="#2f7d4f"/><text x="256" y="109" class="small">03:10</text>
    <rect x="20" y="130" width="220" height="14" rx="7" fill="#f4ead0"/><rect x="20" y="130" width="92" height="14" rx="7" fill="#c8a24a"/><text x="256" y="143" class="small">02:05</text>
    <rect x="386" width="360" height="174" rx="10" fill="#ffffff" stroke="#d8ded8"/><text x="406" y="34" class="h2">Eficiência por turno</text><text x="690" y="34" class="small">Média</text>
    <text x="406" y="76" class="body">Turno 1</text><rect x="480" y="62" width="190" height="18" rx="9" fill="#e7f2ea"/><rect x="480" y="62" width="160" height="18" rx="9" fill="#2f7d4f"/><text x="686" y="76" class="small">84%</text>
    <text x="406" y="118" class="body">Turno 2</text><rect x="480" y="104" width="190" height="18" rx="9" fill="#e8eafb"/><rect x="480" y="104" width="176" height="18" rx="9" fill="#2f3192"/><text x="686" y="118" class="small">91%</text>
    <rect x="772" width="360" height="174" rx="10" fill="#ffffff" stroke="#d8ded8"/><text x="792" y="34" class="h2">Paradas em andamento</text><text x="1050" y="34" class="small">4 abertas</text>
    <circle cx="804" cy="72" r="6" fill="#c8a24a"/><text x="822" y="77" class="body">Frota Demo · Frente A</text><text x="822" y="97" class="small">Acompanhamento operacional</text>
    <circle cx="804" cy="124" r="6" fill="#2f3192"/><text x="822" y="129" class="body">Frota Demo · Frente B</text><text x="822" y="149" class="small">Aguardando atualização</text>
  </g>
  <rect x="34" y="590" width="1132" height="40" rx="10" fill="#ffffff" stroke="#d8ded8"/><text x="58" y="615" class="body">Critério operacional:</text><text x="198" y="615" class="small">Somente registros demonstrativos, com 600 min por turno.</text>
</svg>
