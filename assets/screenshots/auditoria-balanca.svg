<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Tela demonstrativa do sistema de auditoria de balança">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f7fbfd"/><stop offset="1" stop-color="#e7f0f5"/></linearGradient>
    <linearGradient id="side" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#083956"/><stop offset="1" stop-color="#0f5f93"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#101828" flood-opacity="0.18"/></filter>
    <style>.title{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#1d2939}.sub{font:400 16px 'Segoe UI',Arial,sans-serif;fill:#667085}.nav{font:500 15px 'Segoe UI',Arial,sans-serif;fill:#d9ecf5}.panel{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#1d2939}.head{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#667085}.body{font:500 14px 'Segoe UI',Arial,sans-serif;fill:#1d2939}.muted{font:400 13px 'Segoe UI',Arial,sans-serif;fill:#667085}.badge{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#1e7047}.mark{font:800 18px 'Segoe UI',Arial,sans-serif;fill:#0f5f93}.brand{font:700 22px 'Segoe UI',Arial,sans-serif;fill:white}</style>
  </defs>
  <rect width="1200" height="675" fill="#dde8ee"/><rect x="34" y="34" width="1132" height="607" rx="18" fill="white" filter="url(#shadow)"/><rect x="34" y="34" width="258" height="607" fill="url(#side)"/>
  <rect x="62" y="66" width="44" height="44" rx="12" fill="white"/><text x="75" y="95" class="mark">BL</text><text x="122" y="94" class="brand">Balança</text>
  <rect x="58" y="150" width="205" height="45" rx="10" fill="white" opacity="0.16"/><text x="76" y="178" class="nav" fill="white">Auditoria</text><text x="76" y="229" class="nav">Importações</text><text x="76" y="274" class="nav">Divergências</text><text x="76" y="319" class="nav">Relatórios</text>
  <text x="62" y="584" class="nav" font-size="13">Tela ilustrativa sem</text><text x="62" y="604" class="nav" font-size="13">registros reais de pesagem.</text>
  <rect x="292" y="34" width="874" height="607" fill="url(#bg)"/><text x="332" y="103" class="title">Auditoria de Balança</text><text x="332" y="132" class="sub">Conferência de registros, importações e divergências operacionais.</text>
  <rect x="958" y="82" width="134" height="34" rx="17" fill="#e9f7ef" stroke="#b9d9c9"/><text x="983" y="104" class="badge">Conferência ativa</text>
  <rect x="332" y="170" width="190" height="42" rx="10" fill="white" stroke="#d9e2ea"/><text x="354" y="197" class="muted">Período: safra atual</text><rect x="538" y="170" width="170" height="42" rx="10" fill="white" stroke="#d9e2ea"/><text x="560" y="197" class="muted">Status: em análise</text><rect x="724" y="170" width="170" height="42" rx="10" fill="white" stroke="#d9e2ea"/><text x="746" y="197" class="muted">Origem: importação</text>
  <rect x="332" y="244" width="370" height="280" rx="13" fill="white" stroke="#d9e2ea"/><text x="358" y="283" class="panel">Divergências por tipo</text>
  <rect x="382" y="388" width="48" height="92" rx="8" fill="#0f5f93"/><text x="384" y="506" class="muted">Peso</text><rect x="482" y="430" width="48" height="50" rx="8" fill="#2f8f5b"/><text x="484" y="506" class="muted">Frota</text><rect x="582" y="410" width="48" height="70" rx="8" fill="#d6a23a"/><text x="578" y="506" class="muted">Origem</text><rect x="648" y="452" width="48" height="28" rx="8" fill="#0f5f93"/><text x="650" y="506" class="muted">Turno</text>
  <rect x="734" y="244" width="370" height="280" rx="13" fill="white" stroke="#d9e2ea"/><text x="760" y="283" class="panel">Fila de análise</text>
  <text x="760" y="328" class="head">REGISTRO</text><text x="884" y="328" class="head">ORIGEM</text><text x="986" y="328" class="head">STATUS</text><line x1="760" y1="346" x2="1078" y2="346" stroke="#edf1f5"/>
  <text x="760" y="382" class="body">Conferência 001</text><text x="884" y="382" class="body">Importação</text><rect x="986" y="362" width="76" height="28" rx="14" fill="#fff4db"/><text x="1004" y="381" class="badge" fill="#94640f">Revisar</text>
  <text x="760" y="428" class="body">Conferência 002</text><text x="884" y="428" class="body">Manual</text><rect x="986" y="408" width="54" height="28" rx="14" fill="#e9f7ef"/><text x="1004" y="427" class="badge">OK</text>
  <text x="760" y="474" class="body">Conferência 003</text><text x="884" y="474" class="body">Importação</text><rect x="986" y="454" width="76" height="28" rx="14" fill="#fff4db"/><text x="1004" y="473" class="badge" fill="#94640f">Revisar</text>
  <rect x="1010" y="590" width="116" height="30" rx="15" fill="white" fill-opacity="0.9" stroke="#e3e8ef"/><text x="1028" y="610" class="head">Dados fictícios</text>
</svg>
