<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Tela demonstrativa do gestor de colaboradores">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fbfdfb"/><stop offset="1" stop-color="#eef4ef"/></linearGradient>
    <linearGradient id="head" x1="0" x2="1"><stop offset="0" stop-color="#2f3192"/><stop offset="0.45" stop-color="#2f7d4f"/><stop offset="0.72" stop-color="#c8a24a"/><stop offset="1" stop-color="transparent"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#171b1f" flood-opacity="0.10"/></filter>
    <style>.h1{font:750 32px 'Segoe UI',Arial,sans-serif;fill:#17221f}.h2{font:750 22px 'Segoe UI',Arial,sans-serif;fill:#1c2925}.h3{font:750 16px 'Segoe UI',Arial,sans-serif;fill:#22312d}.p{font:400 14px 'Segoe UI',Arial,sans-serif;fill:#63726c}.small{font:600 12px 'Segoe UI',Arial,sans-serif;fill:#63726c}.tab{font:850 12px 'Segoe UI',Arial,sans-serif;fill:#202467}.tabOn{font:850 12px 'Segoe UI',Arial,sans-serif;fill:#fff}.kicker{font:850 11px 'Segoe UI',Arial,sans-serif;fill:#202467;text-transform:uppercase}.num{font:800 28px 'Segoe UI',Arial,sans-serif;fill:#17221f}.badge{font:800 12px 'Segoe UI',Arial,sans-serif;fill:#1f5638}.warn{fill:#7a5a14}.danger{fill:#8c2f29}.label{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#66736b}.body{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#26302d}.brand{font:900 24px 'Segoe UI',Arial,sans-serif;fill:#2f3192}</style>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 44C164 12 272 78 392 48C510 18 660 0 814 46C930 80 1054 72 1200 34V0H0Z" fill="#2f7d4f" opacity="0.06"/>

  <rect x="34" y="26" width="1132" height="104" rx="14" fill="#ffffff" stroke="#d9e2dc" filter="url(#shadow)"/>
  <rect x="34" y="26" width="1132" height="3" fill="url(#head)"/>
  <rect x="58" y="50" width="76" height="56" rx="14" fill="#fff" stroke="#d9e2dc"/><text x="80" y="86" class="brand">UB</text>
  <text x="154" y="66" class="h1">Usina Bazan</text><text x="154" y="94" class="p">Gestor de Colaboradores</text><text x="154" y="114" class="small">Cadastro, documentos, CNH, escala e auditoria de RH.</text>
  <rect x="828" y="54" width="92" height="34" rx="17" fill="#fff" stroke="#d9e2dc"/><text x="852" y="76" class="tab">Launcher</text>
  <circle cx="952" cy="71" r="7" fill="#35a268"/><rect x="972" y="52" width="156" height="40" rx="18" fill="#f9fbf7" stroke="#d7e5dc"/><text x="990" y="69" class="body">Servidor online</text><text x="990" y="86" class="small">Base demonstrativa</text>

  <g transform="translate(34 146)">
    <rect x="0" y="0" width="100" height="36" rx="9" fill="#2f3192"/><text x="23" y="24" class="tabOn">Dashboard</text>
    <rect x="110" y="0" width="98" height="36" rx="9" fill="#fff" stroke="#d7dce8"/><text x="129" y="24" class="tab">Pendências</text>
    <rect x="218" y="0" width="102" height="36" rx="9" fill="#fff" stroke="#d7dce8"/><text x="240" y="24" class="tab">Central CNH</text>
    <rect x="330" y="0" width="82" height="36" rx="9" fill="#fff" stroke="#d7dce8"/><text x="350" y="24" class="tab">Consulta</text>
    <rect x="422" y="0" width="74" height="36" rx="9" fill="#fff" stroke="#d7dce8"/><text x="444" y="24" class="tab">Escala</text>
    <rect x="506" y="0" width="82" height="36" rx="9" fill="#fff" stroke="#d7dce8"/><text x="526" y="24" class="tab">Cadastro</text>
    <rect x="598" y="0" width="88" height="36" rx="9" fill="#fff" stroke="#d7dce8"/><text x="617" y="24" class="tab">Relatórios</text>
    <rect x="696" y="0" width="86" height="36" rx="9" fill="#fff" stroke="#d7dce8"/><text x="716" y="24" class="tab">Auditoria</text>
  </g>

  <rect x="34" y="200" width="1132" height="428" rx="14" fill="#ffffff" stroke="#d9e2dc" filter="url(#shadow)"/>
  <rect x="62" y="228" width="96" height="26" rx="13" fill="#e8eafb"/><text x="81" y="246" class="kicker">Visão geral</text>
  <text x="62" y="282" class="h2">Painel operacional de RH</text>
  <rect x="1040" y="236" width="92" height="34" rx="9" fill="#ffffff" stroke="#d9e2dc"/><text x="1060" y="258" class="tab">Atualizar</text>

  <g transform="translate(62 316)">
    <rect width="178" height="90" rx="12" fill="#f9fbf7" stroke="#d9e2dc"/><text x="18" y="28" class="label">Colaboradores</text><text x="18" y="62" class="num">246</text>
    <rect x="196" width="178" height="90" rx="12" fill="#f9fbf7" stroke="#d9e2dc"/><text x="214" y="28" class="label">CNHs críticas</text><text x="214" y="62" class="num">07</text>
    <rect x="392" width="178" height="90" rx="12" fill="#f9fbf7" stroke="#d9e2dc"/><text x="410" y="28" class="label">Documentos</text><text x="410" y="62" class="num">18</text>
    <rect x="588" width="178" height="90" rx="12" fill="#f9fbf7" stroke="#d9e2dc"/><text x="606" y="28" class="label">Escalas ativas</text><text x="606" y="62" class="num">05</text>
    <rect x="784" width="286" height="90" rx="12" fill="#e8f3ec" stroke="#cfe4d7"/><text x="806" y="34" class="body">Resumo com dados fictícios</text><text x="806" y="62" class="small">Sem nomes, documentos ou informações reais.</text>
  </g>

  <rect x="62" y="430" width="520" height="160" rx="12" fill="#ffffff" stroke="#d9e2dc"/>
  <text x="84" y="460" class="h3">CNHs críticas</text><rect x="488" y="442" width="70" height="26" rx="13" fill="#e8eafb"/><text x="505" y="460" class="label">3 itens</text>
  <text x="84" y="496" class="label">CÓDIGO</text><text x="178" y="496" class="label">IDENTIFICAÇÃO</text><text x="344" y="496" class="label">VALIDADE</text><text x="458" y="496" class="label">STATUS</text>
  <line x1="84" y1="512" x2="558" y2="512" stroke="#eef2ec"/>
  <text x="84" y="540" class="body">COL-001</text><text x="178" y="540" class="body">Colaborador Demo</text><text x="344" y="540" class="body">30/05/2026</text><rect x="458" y="520" width="72" height="26" rx="13" fill="#f4ead0"/><text x="474" y="538" class="badge warn">Alerta</text>
  <text x="84" y="574" class="body">COL-002</text><text x="178" y="574" class="body">Colaborador Demo</text><text x="344" y="574" class="body">15/06/2026</text><rect x="458" y="554" width="74" height="26" rx="13" fill="#fbe7e5"/><text x="474" y="572" class="badge danger">Crítica</text>

  <rect x="614" y="430" width="520" height="160" rx="12" fill="#ffffff" stroke="#d9e2dc"/>
  <text x="636" y="460" class="h3">Documentos a vencer</text><rect x="1020" y="442" width="70" height="26" rx="13" fill="#f4ead0"/><text x="1036" y="460" class="badge warn">30 dias</text>
  <circle cx="650" cy="505" r="6" fill="#c8a24a"/><text x="668" y="511" class="body">Documento demonstrativo</text><text x="668" y="531" class="small">Vencimento próximo · Frente A</text>
  <circle cx="650" cy="558" r="6" fill="#2f7d4f"/><text x="668" y="564" class="body">Treinamento demonstrativo</text><text x="668" y="584" class="small">Acompanhamento administrativo</text>
</svg>
