<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Tela demonstrativa do sistema de gestão de colaboradores">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f7fbfd"/><stop offset="1" stop-color="#e7f0f5"/></linearGradient>
    <linearGradient id="side" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#083956"/><stop offset="1" stop-color="#0f5f93"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#101828" flood-opacity="0.18"/></filter>
    <style>.title{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#1d2939}.sub{font:400 16px 'Segoe UI',Arial,sans-serif;fill:#667085}.nav{font:500 15px 'Segoe UI',Arial,sans-serif;fill:#d9ecf5}.metric-label{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#667085}.metric{font:800 30px 'Segoe UI',Arial,sans-serif;fill:#1d2939}.hint{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#26805a}.panel{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#1d2939}.body{font:500 14px 'Segoe UI',Arial,sans-serif;fill:#1d2939}.muted{font:400 13px 'Segoe UI',Arial,sans-serif;fill:#667085}.badge{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#1e7047}.mark{font:800 18px 'Segoe UI',Arial,sans-serif;fill:#0f5f93}.brand{font:700 22px 'Segoe UI',Arial,sans-serif;fill:white}</style>
  </defs>
  <rect width="1200" height="675" fill="#dde8ee"/><rect x="34" y="34" width="1132" height="607" rx="18" fill="white" filter="url(#shadow)"/><rect x="34" y="34" width="258" height="607" fill="url(#side)"/>
  <rect x="62" y="66" width="44" height="44" rx="12" fill="white"/><text x="75" y="95" class="mark">RH</text><text x="122" y="94" class="brand">Colaboradores</text>
  <rect x="58" y="150" width="205" height="45" rx="10" fill="white" opacity="0.16"/><text x="76" y="178" class="nav" fill="white">Dashboard</text><text x="76" y="229" class="nav">Cadastros</text><text x="76" y="274" class="nav">Documentos</text><text x="76" y="319" class="nav">Relatórios</text>
  <text x="62" y="584" class="nav" font-size="13">Painel demonstrativo</text><text x="62" y="604" class="nav" font-size="13">com informações simuladas.</text>
  <rect x="292" y="34" width="874" height="607" fill="url(#bg)"/><text x="332" y="103" class="title">Gestão de Colaboradores</text><text x="332" y="132" class="sub">Consultas, vencimentos e relatórios administrativos em um único painel.</text>
  <rect x="952" y="82" width="148" height="34" rx="17" fill="#e9f7ef" stroke="#b9d9c9"/><text x="977" y="104" class="badge">Documentos em dia</text>
  <g><rect x="332" y="180" width="240" height="116" rx="13" fill="white" stroke="#d9e2ea"/><text x="354" y="214" class="metric-label">Cadastros ativos</text><text x="354" y="253" class="metric">246</text><text x="354" y="278" class="hint">base organizada</text></g>
  <g><rect x="598" y="180" width="240" height="116" rx="13" fill="white" stroke="#d9e2ea"/><text x="620" y="214" class="metric-label">Alertas próximos</text><text x="620" y="253" class="metric">09</text><text x="620" y="278" class="hint">controle preventivo</text></g>
  <g><rect x="864" y="180" width="240" height="116" rx="13" fill="white" stroke="#d9e2ea"/><text x="886" y="214" class="metric-label">Relatórios</text><text x="886" y="253" class="metric">21</text><text x="886" y="278" class="hint">gerados no mês</text></g>
  <rect x="332" y="326" width="370" height="230" rx="13" fill="white" stroke="#d9e2ea"/><text x="358" y="365" class="panel">Vencimentos por categoria</text>
  <rect x="378" y="448" width="42" height="70" rx="8" fill="#0f5f93"/><text x="382" y="542" class="muted">CNH</text><rect x="452" y="474" width="42" height="44" rx="8" fill="#2f8f5b"/><text x="456" y="542" class="muted">ASO</text><rect x="526" y="432" width="42" height="86" rx="8" fill="#d6a23a"/><text x="516" y="542" class="muted">Trein.</text><rect x="600" y="488" width="42" height="30" rx="8" fill="#0f5f93"/><text x="604" y="542" class="muted">Docs</text>
  <rect x="734" y="326" width="370" height="230" rx="13" fill="white" stroke="#d9e2ea"/><text x="760" y="365" class="panel">Fluxo de trabalho</text>
  <circle cx="774" cy="407" r="6" fill="#0f5f93"/><text x="794" y="413" class="body">Cadastro atualizado</text><text x="794" y="435" class="muted">Dados revisados na rotina administrativa.</text><rect x="996" y="395" width="52" height="26" rx="13" fill="#e9f7ef"/><text x="1013" y="413" class="badge">OK</text>
  <circle cx="774" cy="470" r="6" fill="#0f5f93"/><text x="794" y="476" class="body">Alerta preventivo</text><text x="794" y="498" class="muted">Vencimentos sinalizados antes do prazo.</text><rect x="978" y="458" width="70" height="26" rx="13" fill="#fff4db"/><text x="994" y="476" class="badge" fill="#94640f">Atenção</text>
  <rect x="1010" y="590" width="116" height="30" rx="15" fill="white" fill-opacity="0.9" stroke="#e3e8ef"/><text x="1028" y="610" class="metric-label">Dados fictícios</text>
</svg>
