<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Tela demonstrativa do portal interno e launcher de sistemas">
  <defs>
    <linearGradient id="page" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbf8"/>
      <stop offset="1" stop-color="#edf4ef"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8faf7"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#34369f"/>
      <stop offset="1" stop-color="#2f3192"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1b3529" flood-opacity="0.14"/></filter>
    <style>
      .h1{font:750 38px 'Segoe UI',Arial,sans-serif;fill:#202b28}.h2{font:750 20px 'Segoe UI',Arial,sans-serif;fill:#202b28}.p{font:400 16px 'Segoe UI',Arial,sans-serif;fill:#61736b}.small{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#61736b}.tiny{font:750 11px 'Segoe UI',Arial,sans-serif;fill:#61736b;text-transform:uppercase}.strong{font:800 15px 'Segoe UI',Arial,sans-serif;fill:#202b28}.brand{font:900 24px 'Segoe UI',Arial,sans-serif;fill:#2f3192}.badge{font:800 12px 'Segoe UI',Arial,sans-serif;fill:#1f5f3a}.button{font:850 14px 'Segoe UI',Arial,sans-serif;fill:#fff}.link{font:800 12px 'Segoe UI',Arial,sans-serif;fill:#20246f}.gold{fill:#7a5a14}.muted{fill:#61736b}
    </style>
    <pattern id="cane" width="80" height="80" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
      <path d="M0 40H80" stroke="#2f7d4f" stroke-opacity="0.08" stroke-width="2"/>
      <path d="M0 55H80" stroke="#c8a24a" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#page)"/>
  <rect width="1200" height="675" fill="url(#cane)" opacity="0.7"/>
  <rect x="46" y="28" width="1108" height="48" rx="12" fill="#ffffff" fill-opacity="0.86" stroke="#dbe5de" filter="url(#shadow)"/>
  <text x="68" y="49" class="tiny">Conectado como</text>
  <text x="68" y="67" class="strong">Usuário Demonstração</text>
  <rect x="892" y="39" width="100" height="28" rx="14" fill="#ffffff" stroke="#dbe5de"/><text x="919" y="58" class="link">Liberações</text>
  <rect x="1004" y="39" width="72" height="28" rx="14" fill="#ffffff" stroke="#dbe5de"/><text x="1028" y="58" class="link">Sair</text>

  <rect x="46" y="92" width="1108" height="168" rx="12" fill="url(#panel)" stroke="#dbe5de" filter="url(#shadow)"/>
  <rect x="46" y="92" width="1108" height="168" rx="12" fill="#2f3192" opacity="0.04"/>
  <g opacity="0.11" transform="translate(835 114) scale(2.3)">
    <rect x="0" y="0" width="92" height="68" rx="16" fill="#2f3192"/>
    <text x="22" y="45" font-family="Segoe UI,Arial" font-size="32" font-weight="900" fill="#ffffff">UB</text>
  </g>
  <text x="78" y="164" class="h1">Sistemas internos</text>
  <text x="78" y="196" class="p">Notas, RH, balança e análises.</text>
  <rect x="78" y="216" width="132" height="30" rx="15" fill="#e8f3ec" stroke="#c9e2d3"/><text x="100" y="236" class="badge">Acesso interno</text>

  <text x="58" y="298" class="tiny">Sistemas disponíveis</text>
  <g transform="translate(46 318)">
    <rect width="260" height="178" rx="14" fill="#ffffff" stroke="#dbe5de" filter="url(#shadow)"/>
    <rect x="18" y="18" width="48" height="48" rx="14" fill="#e8eafb"/><text x="30" y="50" class="brand">N</text>
    <rect x="164" y="22" width="78" height="24" rx="12" fill="#e8f3ec"/><text x="184" y="38" class="badge">Online</text>
    <text x="18" y="92" class="tiny">Transporte</text><text x="18" y="120" class="h2">Sistema de Notas</text>
    <text x="18" y="146" class="small">Notas e transporte da safra.</text>
    <rect x="18" y="156" width="124" height="36" rx="8" fill="url(#blue)"/><text x="48" y="179" class="button">Abrir</text>
  </g>
  <g transform="translate(324 318)">
    <rect width="260" height="178" rx="14" fill="#ffffff" stroke="#dbe5de" filter="url(#shadow)"/>
    <rect x="18" y="18" width="48" height="48" rx="14" fill="#e8eafb"/><text x="29" y="50" class="brand">RH</text>
    <rect x="164" y="22" width="78" height="24" rx="12" fill="#e8f3ec"/><text x="184" y="38" class="badge">Online</text>
    <text x="18" y="92" class="tiny">Colaboradores</text><text x="18" y="120" class="h2">Gestor de Colaboradores</text>
    <text x="18" y="146" class="small">Cadastro, documentos e CNH.</text>
    <rect x="18" y="156" width="124" height="36" rx="8" fill="url(#blue)"/><text x="48" y="179" class="button">Abrir</text>
  </g>
  <g transform="translate(602 318)">
    <rect width="260" height="178" rx="14" fill="#ffffff" stroke="#dbe5de" filter="url(#shadow)"/>
    <rect x="18" y="18" width="48" height="48" rx="14" fill="#f7efd9"/><text x="29" y="50" class="brand" fill="#7a5a14">B</text>
    <rect x="154" y="22" width="88" height="24" rx="12" fill="#f7efd9"/><text x="173" y="38" class="badge gold">Atenção</text>
    <text x="18" y="92" class="tiny">Auditoria</text><text x="18" y="120" class="h2">Auditoria da Balança</text>
    <text x="18" y="146" class="small">Conferência e divergências.</text>
    <rect x="18" y="156" width="124" height="36" rx="8" fill="url(#blue)"/><text x="48" y="179" class="button">Abrir</text>
  </g>
  <g transform="translate(880 318)">
    <rect width="260" height="178" rx="14" fill="#ffffff" stroke="#dbe5de" filter="url(#shadow)"/>
    <rect x="18" y="18" width="48" height="48" rx="14" fill="#e8eafb"/><text x="29" y="50" class="brand">A</text>
    <rect x="164" y="22" width="78" height="24" rx="12" fill="#e8f3ec"/><text x="184" y="38" class="badge">Online</text>
    <text x="18" y="92" class="tiny">Operação</text><text x="18" y="120" class="h2">Análises Operacionais</text>
    <text x="18" y="146" class="small">Indicadores e relatórios.</text>
    <rect x="18" y="156" width="124" height="36" rx="8" fill="url(#blue)"/><text x="48" y="179" class="button">Abrir</text>
  </g>

  <rect x="46" y="530" width="1108" height="72" rx="12" fill="#ffffff" fill-opacity="0.88" stroke="#dbe5de"/>
  <text x="72" y="558" class="tiny">Auditoria</text><text x="72" y="579" class="strong">Histórico de atividade e backup centralizado</text>
  <rect x="735" y="548" width="120" height="30" rx="15" fill="#e8eafb"/><text x="758" y="568" class="link">portalbazan:8090</text>
  <rect x="872" y="548" width="116" height="30" rx="15" fill="#e8f3ec"/><text x="895" y="568" class="badge">Dados fictícios</text>
  <text x="1008" y="568" class="small">Desenvolvido por Gabriel Barbosa dos Santos</text>
</svg>
