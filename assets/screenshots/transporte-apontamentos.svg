<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Tela demonstrativa do sistema de transporte e apontamentos">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f7fbfd"/><stop offset="1" stop-color="#e7f0f5"/></linearGradient>
    <linearGradient id="side" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#083956"/><stop offset="1" stop-color="#0f5f93"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#101828" flood-opacity="0.18"/></filter>
    <style>.title{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#1d2939}.sub{font:400 16px 'Segoe UI',Arial,sans-serif;fill:#667085}.nav{font:500 15px 'Segoe UI',Arial,sans-serif;fill:#d9ecf5}.metric-label{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#667085}.metric{font:800 30px 'Segoe UI',Arial,sans-serif;fill:#1d2939}.hint{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#26805a}.head{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#667085}.body{font:500 14px 'Segoe UI',Arial,sans-serif;fill:#1d2939}.badge{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#1e7047}.mark{font:800 18px 'Segoe UI',Arial,sans-serif;fill:#0f5f93}.brand{font:700 22px 'Segoe UI',Arial,sans-serif;fill:white}</style>
  </defs>
  <rect width="1200" height="675" fill="#dde8ee"/><rect x="34" y="34" width="1132" height="607" rx="18" fill="white" filter="url(#shadow)"/><rect x="34" y="34" width="258" height="607" fill="url(#side)"/>
  <rect x="62" y="66" width="44" height="44" rx="12" fill="white"/><text x="75" y="95" class="mark">TR</text><text x="122" y="94" class="brand">Transporte</text>
  <rect x="58" y="150" width="205" height="45" rx="10" fill="white" opacity="0.16"/><text x="76" y="178" class="nav" fill="white">Lançamentos</text><text x="76" y="229" class="nav">Histórico</text><text x="76" y="274" class="nav">Relatórios</text><text x="76" y="319" class="nav">Cadastros</text>
  <text x="62" y="584" class="nav" font-size="13">Exemplo visual sem</text><text x="62" y="604" class="nav" font-size="13">dados reais de operação.</text>
  <rect x="292" y="34" width="874" height="607" fill="url(#bg)"/><text x="332" y="103" class="title">Controle de Transporte</text><text x="332" y="132" class="sub">Acompanhamento de apontamentos e geração de relatórios.</text>
  <rect x="948" y="82" width="144" height="34" rx="17" fill="#e9f7ef" stroke="#b9d9c9"/><text x="973" y="104" class="badge">Rotina organizada</text>
  <g><rect x="332" y="180" width="178" height="116" rx="13" fill="white" stroke="#d9e2ea"/><text x="354" y="214" class="metric-label">Registros do dia</text><text x="354" y="253" class="metric">128</text><text x="354" y="278" class="hint">+12% vs. média</text></g>
  <g><rect x="530" y="180" width="178" height="116" rx="13" fill="white" stroke="#d9e2ea"/><text x="552" y="214" class="metric-label">Relatórios gerados</text><text x="552" y="253" class="metric">16</text><text x="552" y="278" class="hint">sem retrabalho</text></g>
  <g><rect x="728" y="180" width="178" height="116" rx="13" fill="white" stroke="#d9e2ea"/><text x="750" y="214" class="metric-label">Pendências</text><text x="750" y="253" class="metric">04</text><text x="750" y="278" class="hint">em conferência</text></g>
  <g><rect x="926" y="180" width="178" height="116" rx="13" fill="white" stroke="#d9e2ea"/><text x="948" y="214" class="metric-label">Tempo economizado</text><text x="948" y="253" class="metric">3h</text><text x="948" y="278" class="hint">estimativa diária</text></g>
  <rect x="332" y="326" width="772" height="230" rx="13" fill="white" stroke="#d9e2ea"/><text x="358" y="365" class="title" font-size="20">Apontamentos recentes</text>
  <text x="358" y="408" class="head">OPERAÇÃO</text><text x="575" y="408" class="head">SETOR</text><text x="760" y="408" class="head">STATUS</text><text x="970" y="408" class="head">TURNO</text><line x1="358" y1="426" x2="1078" y2="426" stroke="#edf1f5"/>
  <text x="358" y="460" class="body">Transporte interno</text><text x="575" y="460" class="body">Frente A</text><rect x="760" y="440" width="88" height="28" rx="14" fill="#e9f7ef"/><text x="778" y="459" class="badge">Conferido</text><text x="970" y="460" class="body">1º</text>
  <text x="358" y="504" class="body">Movimentação de frota</text><text x="575" y="504" class="body">Frente B</text><rect x="760" y="484" width="76" height="28" rx="14" fill="#fff4db"/><text x="778" y="503" class="badge" fill="#94640f">Revisão</text><text x="970" y="504" class="body">2º</text>
  <rect x="1010" y="590" width="116" height="30" rx="15" fill="white" fill-opacity="0.9" stroke="#e3e8ef"/><text x="1028" y="610" class="metric-label">Dados fictícios</text>
</svg>
